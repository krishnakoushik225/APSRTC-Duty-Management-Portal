spring.application.name=user-service-test

grpc.server.port=-1

spring.datasource.url=jdbc:h2:mem:apsrtc_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=false

jwt.secret=my-strong-secret-key-which-is-hard-to-decode
jwt.expiration-ms=86400000

app.security.cors-allowed-origins=http://localhost:3000
app.security.token-blacklist=memory

spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

spring.mail.host=localhost
spring.mail.port=3025
spring.mail.username=test
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false

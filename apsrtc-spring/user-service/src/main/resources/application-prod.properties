spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.security.token-blacklist=redis
app.security.login-rate-limit.backend=redis

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=${spring.application.name}
management.tracing.sampling.probability=${TRACE_SAMPLE_PROBABILITY:0.1}

# Set when shipping to an OTLP collector (e.g. Grafana/Datadog agent); leave empty to disable export
management.otlp.metrics.export.url=${OTLP_METRICS_URL:}
management.otlp.tracing.endpoint=${OTLP_TRACES_ENDPOINT:}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${REDIS_SSL:false}

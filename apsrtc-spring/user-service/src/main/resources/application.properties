spring.application.name=user-service
server.port=${PORT:8080}
spring.profiles.default=dev

# JWT — set JWT_SECRET in production (min. 32 bytes for HS256)
jwt.secret=${JWT_SECRET:my-strong-secret-key-which-is-hard-to-decode}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Comma-separated browser origins (frontend URLs)
app.security.cors-allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://apsrtc-duty-portal.vercel.app}

# Per-IP bucket for POST /auth/login (token refill per window)
app.security.login-rate-limit.capacity=${LOGIN_RATE_LIMIT_CAPACITY:30}
app.security.login-rate-limit.refill-minutes=${LOGIN_RATE_LIMIT_WINDOW_MINUTES:1}

# token-blacklist=memory (single instance) or redis (production / multi-instance)
# Overridden per profile in application-dev.properties / application-prod.properties

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:30000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:600000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}

# Actuator defaults (refine per profile)
# Email (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

logging.level.root=info
logging.pattern.console=%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %5p [%15.15t] [%X{correlationId:-}] %-40.40logger{39} : %m%n%wEx

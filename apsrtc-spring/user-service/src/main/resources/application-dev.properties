# Local / single-instance: Flyway owns schema; Hibernate validates only.
# Requires empty PostgreSQL DB or Flyway history already in sync with V1.

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.flyway.enabled=true

app.security.token-blacklist=memory
app.security.login-rate-limit.backend=memory

spring.autoconfigure.exclude=\
org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized

spring.datasource.hikari.leak-detection-threshold=60000

logging.level.org.springframework.web.cors.CorsConfiguration=INFO
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=ERROR
